name: Google Scholar Stats

on:
  schedule:
    - cron: "0 8 * * 1"   # every Monday 08:00 UTC
  workflow_dispatch:        # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  scholar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install scholarly

      - name: Fetch Google Scholar stats
        run: python scripts/fetch_scholar.py

      - name: Publish stats to google-scholar-stats branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gs_out
          publish_branch: google-scholar-stats
          force_orphan: true
